      "@context": "https://schema.org",

      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is ChalkPicks?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChalkPicks is an AI-powered sports betting analytics platform that provides picks with confidence scores, a +EV (positive expected value) finder, prop builder, line movement tracker, steam move detector, and arbitrage alerts for NFL, NBA, MLB, and NHL. Every pick includes an AI-generated analysis, edge score, and recommended sportsbook line."

          "@type": "Question",
          "name": "How much does ChalkPicks cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChalkPicks offers a Basic plan at $9.99/month, a Pro plan at $19.99/month, and an Elite yearly plan at $59.99/year. All plans include full access to every premium tool: AI picks, +EV finder, prop builder, line movement tracker, arbitrage finder, and CLV tracker."
          }
        },
        {
          "@type": "Question",
          "name": "What is a +EV bet and how does ChalkPicks find them?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A +EV (positive expected value) bet is a wager where the true probability of winning is higher than what the sportsbook's odds imply, giving you a mathematical edge over time. ChalkPicks scans odds from 15+ sportsbooks in real time, calculates the no-vig fair line using AI models, and surfaces every bet where the market is mispriced in your favor."
          }
        },
        {
          "@type": "Question",
          "name": "Does ChalkPicks have a free parlay calculator?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. ChalkPicks includes a free Bet Calculator at chalkpicks.live/bet-calculator that converts American, decimal, and fractional odds, calculates multi-leg parlay payouts, and computes optimal Kelly Criterion bet sizing — no account required."
          }
        },
        {
          "@type": "Question",
          "name": "What sports does ChalkPicks cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChalkPicks covers NFL, NBA, MLB, NHL, NCAAF, NCAAB, MMA, Soccer, and Tennis. AI picks, live odds, player props, and line movement data are available for all supported sports throughout the season."
          }
        },
        {
          "@type": "Question",
          "name": "What is closing line value (CLV) and why does it matter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Closing Line Value (CLV) measures whether you bet a line that was better than the line at game time. Consistently beating the closing line is the strongest predictor of long-term profitability in sports betting. ChalkPicks tracks your CLV automatically on every recorded bet."
          }
        },
        {
          "@type": "Question",
          "name": "What is a steam move in sports betting?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A steam move is a sudden, sharp line movement across multiple sportsbooks caused by coordinated sharp (professional) bettor action. Steam moves signal that informed money has identified value. ChalkPicks detects steam moves in real time and alerts you before the line fully adjusts."
          }
        },
        {
          "@type": "Question",
          "name": "How does the ChalkPicks arbitrage finder work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The ChalkPicks arbitrage finder continuously compares odds across 15+ sportsbooks and flags opportunities where you can bet both sides of a game at different books and lock in a guaranteed profit regardless of outcome. Each opportunity shows the exact bet amounts, books, and guaranteed return percentage."
          }
        }
      ]
    }
